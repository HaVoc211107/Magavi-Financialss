<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magavi Ledger | Book</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Magavi Ledger</div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="dashboard.html">Books</a>
        <a href="#" aria-disabled="true">Settings</a>
      </nav>
      <button id="logoutBtn" class="ghost">Logout</button>
    </aside>

    <main class="main">
      <header class="page-header">
        <div>
          <h1 id="bookTitle">Book</h1>
          <p class="muted">Manage categories and entries.</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel-row">
          <h2>Categories</h2>
          <form id="newCategoryForm" class="inline-form">
            <input type="text" id="newCategoryName" placeholder="New category" required />
            <button type="submit" class="primary">Add</button>
          </form>
        </div>
        <div id="categoryList" class="chip-list"></div>
      </section>

      <section class="panel">
        <h2>Add Entry</h2>
        <form id="entryForm" class="form-grid">
          <label>
            Date
            <input type="date" id="entryDate" required />
          </label>
          <label>
            Description
            <input type="text" id="entryDesc" placeholder="Short note" required />
          </label>
          <label>
            Amount
            <input type="number" id="entryAmount" step="0.01" min="0" required />
          </label>
          <label>
            Type
            <select id="entryType" required>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </label>
          <label>
            Category
            <select id="entryCategory" required></select>
          </label>
          <div class="form-actions">
            <button type="submit" class="primary">Add Entry</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Entries</h2>
        <div class="table-wrap">
          <table class="entries-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th>Type</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody id="entryList"></tbody>
          </table>
        </div>
        <p id="emptyEntries" class="tiny muted">No entries yet. Add your first one above.</p>
      </section>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/book.js"></script>
</body>
</html>
